limit_req_zone $binary_remote_addr zone=vinesent_api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=vinesent_admin:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=vinesent_web:10m rate=10r/s;

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=vinesent_cache:20m max_size=512m inactive=60m use_temp_path=off;
