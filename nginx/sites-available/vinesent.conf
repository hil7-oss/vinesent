server {
  listen 80;
  listen [::]:80;
  server_name vinesent.com www.vinesent.com admin.vinesent.com api.vinesent.com;
  return 301 https://$host$request_uri;
}

# ── Storefront ────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name vinesent.com www.vinesent.com;

  ssl_certificate /etc/letsencrypt/live/vinesent.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/vinesent.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  include /etc/nginx/snippets/vinesent_security.conf;
  limit_req zone=vinesent_web burst=30 nodelay;

  # Allow indexing on the storefront
  add_header X-Robots-Tag "index, follow" always;

  # Static uploads — aggressive caching, no X-Robots
  location /uploads/ {
    include /etc/nginx/snippets/vinesent_proxy.conf;
    proxy_pass http://127.0.0.1:8000;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Vary "Accept-Encoding" always;
  }

  # Next.js static files - aggressive caching
  location /_next/static/ {
    include /etc/nginx/snippets/vinesent_proxy.conf;
    proxy_pass http://127.0.0.1:3000;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Next.js images - cache for 1 year
  location /_next/image {
    include /etc/nginx/snippets/vinesent_proxy.conf;
    proxy_pass http://127.0.0.1:3000;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    include /etc/nginx/snippets/vinesent_proxy.conf;
    proxy_pass http://127.0.0.1:3000;
  }
}

# ── Admin ─────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin.vinesent.com;

  ssl_certificate /etc/letsencrypt/live/vinesent.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/vinesent.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  include /etc/nginx/snippets/vinesent_security.conf;
  limit_req zone=vinesent_admin burst=10 nodelay;

  # Admin panel shouldn't be indexed
  add_header X-Robots-Tag "noindex, nofollow" always;

  location / {
    include /etc/nginx/snippets/vinesent_proxy.conf;
    proxy_pass http://127.0.0.1:3001;
  }
}

# ── API ───────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.vinesent.com;

  ssl_certificate /etc/letsencrypt/live/vinesent.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/vinesent.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  include /etc/nginx/snippets/vinesent_security.conf;
  limit_req zone=vinesent_api burst=20 nodelay;

  # API should never be indexed by search engines
  add_header X-Robots-Tag "noindex, nofollow" always;

  location = /metrics {
    allow 127.0.0.1;
    deny all;
    include /etc/nginx/snippets/vinesent_proxy.conf;
    proxy_pass http://127.0.0.1:8000;
  }

  location / {
    include /etc/nginx/snippets/vinesent_proxy.conf;
    proxy_pass http://127.0.0.1:8000;
  }
}
