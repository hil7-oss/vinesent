services:
  reverse-proxy:
    image: traefik:v3.3
    environment:
      - DOCKER_API_VERSION=1.47
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
      - --accesslog=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - traefik_letsencrypt:/letsencrypt
      - /run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public
      - internal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.secHeaders.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secHeaders.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secHeaders.headers.stsPreload=true"
      - "traefik.http.middlewares.secHeaders.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secHeaders.headers.frameDeny=true"
      - "traefik.http.middlewares.secHeaders.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.secHeaders.headers.permissionsPolicy=geolocation=(), microphone=(), camera=()"

  postgres:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: ./vinesent-storefront
      dockerfile: Dockerfile
      target: migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${POSTGRES_DB}?connect_timeout=10
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: fastapi_app/Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-300}
      RATE_LIMIT_ADMIN_PER_MINUTE: ${RATE_LIMIT_ADMIN_PER_MINUTE:-60}
      RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-30}
      RATE_LIMIT_UPLOAD_PER_MINUTE: ${RATE_LIMIT_UPLOAD_PER_MINUTE:-2000}
      RATE_LIMIT_LIQPAY_PER_MINUTE: ${RATE_LIMIT_LIQPAY_PER_MINUTE:-120}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ALLOW_ORIGINS: https://${DOMAIN},https://${ADMIN_DOMAIN}
      TRUSTED_HOSTS: ${DOMAIN},${ADMIN_DOMAIN},${API_DOMAIN},backend,localhost
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY}
      LIQPAY_CALLBACK_URL: https://${API_DOMAIN}/liqpay/callback
      LIQPAY_RESULT_BASE: https://${DOMAIN}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      GOOGLE_APPLICATION_CREDENTIALS_B64: ${GOOGLE_APPLICATION_CREDENTIALS_B64}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.0-flash}
      GEMINI_LOCATION: ${GEMINI_LOCATION:-us-central1}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    volumes:
      - uploads_data:/app/fastapi_app/uploads
      - content_data:/app/fastapi_app/data
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.routers.api.middlewares=secHeaders@docker,apiRate@docker,apiBuffer@docker"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.apiRate.ratelimit.average=5"
      - "traefik.http.middlewares.apiRate.ratelimit.burst=20"
      - "traefik.http.middlewares.apiBuffer.buffering.maxRequestBodyBytes=${MAX_UPLOAD_BYTES:-10485760}"
      - "traefik.http.middlewares.apiBuffer.buffering.memRequestBodyBytes=1048576"
      - "traefik.http.middlewares.metricsWhitelist.ipwhitelist.sourcerange=${METRICS_IP_ALLOWLIST:-127.0.0.1/32}"
      - "traefik.http.routers.api-metrics.rule=Host(`${API_DOMAIN}`) && Path(`/metrics`)"
      - "traefik.http.routers.api-metrics.entrypoints=websecure"
      - "traefik.http.routers.api-metrics.tls.certresolver=le"
      - "traefik.http.routers.api-metrics.priority=200"
      - "traefik.http.routers.api-metrics.service=api"
      - "traefik.http.routers.api-metrics.middlewares=secHeaders@docker,metricsWhitelist@docker"

  storefront:
    build:
      context: ./vinesent-storefront
      dockerfile: Dockerfile
      args:
        FASTAPI_URL: http://backend:8000
        NEXT_PUBLIC_FASTAPI_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
        SITE_URL: https://${DOMAIN}
        RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-600}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    environment:
      NODE_ENV: production
      FASTAPI_URL: http://backend:8000
      NEXT_PUBLIC_FASTAPI_URL: https://${API_DOMAIN}
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
      SITE_URL: https://${DOMAIN}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-600}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://${DOMAIN}
    networks:
      - internal
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.routers.web.middlewares=secHeaders@docker,webRate@docker"
      - "traefik.http.middlewares.webRate.ratelimit.average=10"
      - "traefik.http.middlewares.webRate.ratelimit.burst=30"
      - "traefik.http.routers.webapi.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.webapi.entrypoints=websecure"
      - "traefik.http.routers.webapi.tls.certresolver=le"
      - "traefik.http.routers.webapi.priority=90"
      - "traefik.http.routers.webapi.service=web"
      - "traefik.http.routers.webapi.middlewares=secHeaders@docker,apiEdgeRate@docker"
      - "traefik.http.middlewares.apiEdgeRate.ratelimit.average=5"
      - "traefik.http.middlewares.apiEdgeRate.ratelimit.burst=20"
      - "traefik.http.routers.web-uploads.rule=Host(`${DOMAIN}`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.web-uploads.entrypoints=websecure"
      - "traefik.http.routers.web-uploads.tls.certresolver=le"
      - "traefik.http.routers.web-uploads.priority=100"
      - "traefik.http.routers.web-uploads.service=api"
      - "traefik.http.routers.web-uploads.middlewares=secHeaders@docker"

  admin:
    build:
      context: ./vinesent-admin
      dockerfile: Dockerfile
      args:
        FASTAPI_URL: http://backend:8000
        NEXT_PUBLIC_FASTAPI_URL: https://${API_DOMAIN}
        RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-600}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    environment:
      NODE_ENV: production
      FASTAPI_URL: http://backend:8000
      NEXT_PUBLIC_FASTAPI_URL: https://${API_DOMAIN}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-600}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://${ADMIN_DOMAIN}
    networks:
      - internal
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
      - "traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=le"
      - "traefik.http.routers.admin.service=admin"
      - "traefik.http.routers.admin.middlewares=secHeaders@docker,adminRate@docker"
      - "traefik.http.middlewares.adminRate.ratelimit.average=30"
      - "traefik.http.middlewares.adminRate.ratelimit.burst=50"
      - "traefik.http.routers.admin-uploads.rule=Host(`${ADMIN_DOMAIN}`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.admin-uploads.entrypoints=websecure"
      - "traefik.http.routers.admin-uploads.tls.certresolver=le"
      - "traefik.http.routers.admin-uploads.priority=100"
      - "traefik.http.routers.admin-uploads.service=api"
      - "traefik.http.routers.admin-uploads.middlewares=secHeaders@docker"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  content_data:
  traefik_letsencrypt:

networks:
  public:
  internal:
